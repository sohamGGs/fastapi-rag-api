# docker-compose.yml
version: '3.8'

services:
  rag-api:
    build: .
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      # These tell get_chroma_client() to use HttpClient
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - chromadb
    volumes:
      - ./data:/app/data  # Mount your local /data folder so txt files are accessible

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma  # Persistent volume for DB data

volumes:
  chroma_data: